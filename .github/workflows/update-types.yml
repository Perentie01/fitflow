name: Update Supabase Types

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    name: Generate TypeScript types
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b0f5702ae6b6e1a9e787e28e41e6c0e79d5e8774 # v1.5.7
        with:
          version: latest

      - name: Generate types
        run: |
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_ID" \
            --schema public \
            > src/lib/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Commit updated types
        uses: stefanzweifel/git-auto-commit-action@e348103e667707ab3eb6d9e49e3dbae73fc7523d # v5.0.0
        with:
          commit_message: "chore: regenerate supabase types"
          file_pattern: src/lib/database.types.ts
